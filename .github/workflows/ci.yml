name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Force Node 24 for JS-based actions whose upstream still ships
      # Node 20 (e.g. mlugg/setup-zig as of v2.2.1). Drop this when every
      # action below runs on Node 24 natively. GitHub deadline: 2026-06-02.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig fmt --check
        run: zig fmt --check src tests build.zig build.zig.zon

      - name: zig build
        run: zig build

      - name: zig build tests
        run: zig build tests --summary all

      - name: ansi-test load rate
        # Tracks how much of the ANSI suite loads and runs. The rt-based
        # test play depends on layers still under construction, so this is
        # expected to be incomplete and must not gate the build yet.
        continue-on-error: true
        run: zig build ansi-test
