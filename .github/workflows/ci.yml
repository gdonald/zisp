name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: zig fmt --check
        run: zig fmt --check src tests build.zig build.zig.zon

      - name: zig build
        run: zig build

      - name: zig build tests
        run: zig build tests --summary all
